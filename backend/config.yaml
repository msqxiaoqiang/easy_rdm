# 应用元信息
app:
  name: "easy_rdm"
  org: "jm"
  version: "1.0.0"
  # 生产环境留空（自动基于 exe 位置推算），本地调试用 "." 指向当前工作目录
  base_path: "."

# 服务配置
server:
  # 服务模式：socket（GMSSH 生产）/ http（调试 + Web 独立部署）/ desktop（Wails 桌面端）
  mode: "http"
  # HTTP 模式配置
  http:
    # 安全提示：0.0.0.0 会暴露到所有网络接口，生产环境建议用 127.0.0.1
    host: "127.0.0.1"
    port: 8899
  # Socket 生产模式配置
  socket:
    path: "app.sock"
  # 静态文件目录（Web 独立部署用，留空则使用 embed 的前端产物）
  static_dir: ""

# 日志配置
log:
  level: "info"
  dir: "logs"
  max_size: 100
  max_backups: 3

# AES 加密配置
security:
  # 密钥派生种子（生产环境由应用实例 ID 自动派生，此处为调试用默认值）
  key_seed: "easy_rdm_default_seed"
